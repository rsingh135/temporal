# cargo-deny config: supply-chain guardrails for the daemon workspace.
# Run via CI (EmbarkStudios/cargo-deny-action) or `cargo deny check` locally.

[advisories]
# Fail on security advisories and yanked crates. (vulnerability / unmaintained
# default to "deny" / "warn" in cargo-deny >= 0.16.)
yanked = "deny"

[licenses]
version = 2
# Permissive licenses compatible with this MIT project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
# Weak-copyleft crates are fine to link; flag anything not on the allow list.
confidence-threshold = 0.9

[bans]
# Duplicate versions are a smell, not a failure.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
