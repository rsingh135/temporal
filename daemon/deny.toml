# cargo-deny config: supply-chain guardrails for the daemon workspace.
# Run via CI (EmbarkStudios/cargo-deny-action) or `cargo deny check` locally.

[advisories]
# Fail on security advisories and yanked crates. (vulnerability / unmaintained
# default to "deny" / "warn" in cargo-deny >= 0.16.)
yanked = "deny"
ignore = [
    # `paste` is unmaintained (RUSTSEC-2024-0436) but pulled in transitively by
    # tokenizers; no safe upgrade exists and it's a compile-time macro crate
    # (no runtime attack surface). Re-evaluate when tokenizers drops it.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive licenses compatible with this MIT project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-root-certs (via ort/ureq): Mozilla CA bundle, data-license only.
    "CDLA-Permissive-2.0",
]
# Weak-copyleft crates are fine to link; flag anything not on the allow list.
confidence-threshold = 0.9

[bans]
# Duplicate versions are a smell, not a failure.
multiple-versions = "warn"
# Reject wildcard version reqs from crates.io, but exempt workspace-internal
# path deps (they're pinned by the lockfile, not the registry).
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
